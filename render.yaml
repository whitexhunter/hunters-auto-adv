services:
  - type: web
    name: hunters-api
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        value: https://hunters-api.onrender.com/api/auth/discord/callback
    healthCheckPath: /api/health

  - type: worker
    name: hunters-worker
    env: node
    buildCommand: cd worker && npm install
    startCommand: cd worker && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
